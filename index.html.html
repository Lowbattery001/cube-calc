<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คํานวณกําลังอัดลูกปูน</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --card: #1e2333;
    --border: #2a3048;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --warn: #ff4d4d;
    --pass: #00d4aa;
    --fail: #ff4d4d;
    --text: #e8ecf4;
    --muted: #7a839e;
    --label: #a0aabf;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘IBM Plex Sans Thai’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
display: flex;
justify-content: center;
padding: 24px 16px 48px;
}

.container {
width: 100%;
max-width: 480px;
}

/* Header */
.header {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 28px;
padding-bottom: 20px;
border-bottom: 1px solid var(–border);
}

.header-icon {
width: 40px; height: 40px;
background: linear-gradient(135deg, var(–accent), var(–accent2));
border-radius: 10px;
display: flex; align-items: center; justify-content: center;
font-size: 20px;
flex-shrink: 0;
}

.header h1 {
font-size: 17px;
font-weight: 600;
letter-spacing: 0.01em;
line-height: 1.3;
color: var(–text);
}

.header p {
font-size: 12px;
color: var(–muted);
font-family: ‘IBM Plex Mono’, monospace;
margin-top: 2px;
}

/* Datetime row */
.datetime-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-bottom: 20px;
}

.dt-box {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 14px;
}

.dt-box label {
display: block;
font-size: 10px;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.08em;
margin-bottom: 4px;
font-family: ‘IBM Plex Mono’, monospace;
}

.dt-box span {
font-size: 14px;
font-weight: 600;
color: var(–text);
font-family: ‘IBM Plex Mono’, monospace;
}

/* Section label */
.section-label {
font-size: 11px;
font-weight: 600;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.1em;
margin-bottom: 10px;
font-family: ‘IBM Plex Mono’, monospace;
}

/* Inputs */
.inputs-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 14px;
padding: 16px;
margin-bottom: 14px;
}

.input-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 10px;
}

.input-row:last-child { margin-bottom: 0; }

.input-num {
width: 22px; height: 22px;
background: var(–border);
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 11px;
font-family: ‘IBM Plex Mono’, monospace;
font-weight: 600;
color: var(–muted);
flex-shrink: 0;
}

.input-field {
flex: 1;
background: var(–surface);
border: 1.5px solid var(–border);
border-radius: 8px;
padding: 10px 14px;
font-size: 18px;
font-weight: 600;
font-family: ‘IBM Plex Mono’, monospace;
color: var(–text);
outline: none;
transition: border-color 0.15s, box-shadow 0.15s;
width: 100%;
}

.input-field:focus {
border-color: var(–accent);
box-shadow: 0 0 0 3px rgba(0,212,170,0.12);
}

.input-unit {
font-size: 13px;
color: var(–muted);
font-family: ‘IBM Plex Mono’, monospace;
font-weight: 500;
width: 28px;
text-align: right;
}

/* Formula */
.formula-box {
background: rgba(0,153,255,0.07);
border: 1px solid rgba(0,153,255,0.2);
border-radius: 8px;
padding: 8px 12px;
margin-bottom: 16px;
font-size: 12px;
color: var(–accent2);
font-family: ‘IBM Plex Mono’, monospace;
}

.formula-box span { color: var(–muted); font-size: 11px; }

/* Config row */
.config-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-bottom: 16px;
}

.config-box {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 14px;
}

.config-box label {
display: block;
font-size: 10px;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.07em;
margin-bottom: 5px;
font-family: ‘IBM Plex Mono’, monospace;
}

.config-box input, .config-box select {
background: transparent;
border: none;
font-size: 14px;
font-weight: 600;
font-family: ‘IBM Plex Mono’, monospace;
color: var(–text);
outline: none;
width: 100%;
}

.config-box select option { background: var(–card); }

/* Button */
.calc-btn {
width: 100%;
padding: 14px;
background: linear-gradient(135deg, var(–accent), #00b894);
border: none;
border-radius: 12px;
font-family: ‘IBM Plex Sans Thai’, sans-serif;
font-size: 16px;
font-weight: 700;
color: #0a1a15;
cursor: pointer;
letter-spacing: 0.02em;
transition: opacity 0.15s, transform 0.1s;
margin-bottom: 24px;
}

.calc-btn:hover { opacity: 0.9; }
.calc-btn:active { transform: scale(0.98); }

/* Results */
.results-section { animation: fadeUp 0.35s ease; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(12px); }
to   { opacity: 1; transform: translateY(0); }
}

.result-rows {
background: var(–card);
border: 1px solid var(–border);
border-radius: 14px;
overflow: hidden;
margin-bottom: 14px;
}

.result-row {
display: flex;
align-items: center;
padding: 13px 16px;
border-bottom: 1px solid var(–border);
gap: 12px;
}

.result-row:last-child { border-bottom: none; }

.result-label {
font-size: 13px;
color: var(–label);
flex: 1;
font-family: ‘IBM Plex Mono’, monospace;
}

.result-value {
font-size: 16px;
font-weight: 700;
font-family: ‘IBM Plex Mono’, monospace;
color: var(–text);
}

.badge {
font-size: 11px;
font-weight: 700;
padding: 3px 9px;
border-radius: 20px;
font-family: ‘IBM Plex Mono’, monospace;
letter-spacing: 0.05em;
}

.badge.pass { background: rgba(0,212,170,0.15); color: var(–pass); }
.badge.fail { background: rgba(255,77,77,0.15); color: var(–fail); }

/* Average card */
.avg-card {
background: linear-gradient(135deg, rgba(0,212,170,0.1), rgba(0,153,255,0.08));
border: 1px solid rgba(0,212,170,0.25);
border-radius: 14px;
padding: 18px 20px;
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 20px;
}

.avg-label {
font-size: 13px;
color: var(–muted);
font-family: ‘IBM Plex Mono’, monospace;
text-transform: uppercase;
letter-spacing: 0.08em;
}

.avg-value {
font-size: 28px;
font-weight: 700;
font-family: ‘IBM Plex Mono’, monospace;
color: var(–accent);
letter-spacing: -0.5px;
}

.avg-unit {
font-size: 14px;
color: var(–muted);
font-family: ‘IBM Plex Mono’, monospace;
margin-left: 4px;
}

/* Chart */
.chart-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 14px;
padding: 16px;
overflow: hidden;
}

.chart-title {
font-size: 12px;
font-weight: 600;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.08em;
font-family: ‘IBM Plex Mono’, monospace;
margin-bottom: 16px;
}

.chart-area {
position: relative;
height: 180px;
display: flex;
align-items: flex-end;
gap: 8px;
padding-bottom: 24px;
}

.chart-bar-wrap {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
gap: 0;
height: 100%;
justify-content: flex-end;
position: relative;
}

.chart-bar {
width: 100%;
border-radius: 6px 6px 0 0;
min-height: 4px;
transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
position: relative;
}

.chart-bar.pass-bar { background: linear-gradient(180deg, #00d4aa, #00b38a); }
.chart-bar.fail-bar { background: linear-gradient(180deg, #ff6b6b, #cc3333); }

.chart-bar-val {
position: absolute;
top: -20px;
left: 50%;
transform: translateX(-50%);
font-size: 10px;
font-family: ‘IBM Plex Mono’, monospace;
font-weight: 600;
color: var(–text);
white-space: nowrap;
}

.chart-bar-lbl {
position: absolute;
bottom: -20px;
left: 50%;
transform: translateX(-50%);
font-size: 11px;
color: var(–muted);
font-family: ‘IBM Plex Mono’, monospace;
white-space: nowrap;
}

.threshold-line {
position: absolute;
left: 0; right: 0;
height: 1.5px;
background: rgba(255,100,100,0.7);
border-top: 1.5px dashed rgba(255,100,100,0.7);
}

.threshold-tag {
position: absolute;
right: 0;
background: rgba(255,77,77,0.15);
border: 1px solid rgba(255,77,77,0.3);
color: #ff8080;
font-size: 10px;
font-family: ‘IBM Plex Mono’, monospace;
padding: 1px 6px;
border-radius: 4px;
transform: translateY(-50%);
white-space: nowrap;
}

/* summary badge */
.summary-bar {
display: flex;
align-items: center;
justify-content: space-between;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 14px;
margin-bottom: 20px;
}

.summary-bar span {
font-size: 12px;
color: var(–muted);
font-family: ‘IBM Plex Mono’, monospace;
}

.overall-badge {
font-size: 13px;
font-weight: 700;
padding: 4px 14px;
border-radius: 20px;
font-family: ‘IBM Plex Mono’, monospace;
}

.overall-badge.pass { background: rgba(0,212,170,0.18); color: var(–pass); }
.overall-badge.fail { background: rgba(255,77,77,0.18); color: var(–fail); }

.hidden { display: none; }
</style>

</head>
<body>
<div class="container">

  <!-- Header -->

  <div class="header">
    <div class="header-icon">🧱</div>
    <div>
      <h1>คํานวณกําลังอัดลูกปูน (Cube)</h1>

  <!-- Datetime -->

    <div class="input-row">

  <!-- Formula -->

  <div class="formula-box" onclick="toggleFormulaEdit()" style="cursor:pointer;user-select:none;">

      </div>
      <span id="formulaToggleIcon" style="font-size:11px;color:var(--accent);font-family:'IBM Plex Mono',monospace;margin-left:8px;white-space:nowrap;">⚙️ แก้</span>
    </div>

  <!-- Formula Editor (hidden by default) -->

  <div id="formulaEditor" class="hidden" style="background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:14px 16px;margin-bottom:14px;">
    <div class="section-label" style="margin-bottom:10px;color:var(--accent);">⚙️ ตั้งค่าสูตรปรับแก้</div>
    <div style="font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-bottom:12px;" id="editorFormula">
      ksc = ((Kn × A <span id="editorSign">−</span> B) × 101.972) ÷ 225
    </div>

        <input type="number" id="coeffA" value="0.983" step="0.001" style="background:transparent;border:none;font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--accent);outline:none;width:100%;" oninput="updateFormulaDisplay()">
      </div>

      <div class="config-box">
        <label>B (ค่า B)</label>
        <input type="number" id="coeffB" value="4.175" step="0.001" style="background:transparent;border:none;font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--accent);outline:none;width:100%;" oninput="updateFormulaDisplay()">

  <!-- Config -->

  <div class="config-row">
    <div class="config-box">
      <label>เกณฑ์ผ่าน (ksc)</label>
      <input type="number" id="threshold" value="350">
    </div>
    <div class="config-box">
      <label>ประเภทการทดสอบ</label>
      <select id="testType">
        <option value="Early Strength@18Hr">Early @18Hr</option>
        <option value="3 Days">3 Days</option>
        <option value="7 Days">7 Days</option>
        <option value="28 Days">28 Days</option>

<script>
  // DateTime
  function updateTime() {
    const now = new Date();
    const d = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    const t = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('dateDisplay').textContent = d;
    document.getElementById('timeDisplay').textContent = t;
  }
  updateTime();
  setInterval(updateTime, 1000);

  function calculate() {
    const raw = [
      document.getElementById('v1').value,
      document.getElementById('v2').value,
      document.getElementById('v3').value
    ];
    const vals = raw
      .map(v => v.trim())
      .filter(v => v !== '')
      .map(v => parseFloat(v));

    const threshold = parseFloat(document.getElementById('threshold').value) || 350;
    const testType = document.getElementById('testType').value;

    if (vals.length === 0) {
      alert('\u0e01\u0e23\u0e38\u0e13\u0e32\u0e01\u0e23\u0e2d\u0e01\u0e04\u0e48\u0e32 kN \u0e2d\u0e22\u0e48\u0e32\u0e07\u0e19\u0e49\u0e2d\u0e22 1 \u0e0a\u0e48\u0e2d\u0e07');
      return;
    }
    if (vals.some(isNaN)) {
      alert('\u0e04\u0e48\u0e32\u0e17\u0e35\u0e48\u0e01\u0e23\u0e2d\u0e01\u0e44\u0e21\u0e48\u0e16\u0e39\u0e01\u0e15\u0e49\u0e2d\u0e07 \u0e01\u0e23\u0e38\u0e13\u0e32\u0e15\u0e23\u0e27\u0e08\u0e2a\u0e2d\u0e1a\u0e2d\u0e35\u0e01\u0e04\u0e23\u0e31\u0e49\u0e07');
      return;
    }

    // Convert using editable coefficients A, B and sign
    const A = parseFloat(document.getElementById('coeffA').value) || 0.983;
    const B = parseFloat(document.getElementById('coeffB').value) || 4.175;
    const signVal = document.getElementById('signBtn').dataset.sign === '+' ? 1 : -1;
    const ksc = vals.map(v => (((v * A) + signVal * B) * 101.972) / 225);
    const avg = ksc.reduce((a, b) => a + b, 0) / ksc.length;

    // Build results
    const rowsEl = document.getElementById('resultRows');
    rowsEl.innerHTML = '';
    let passCount = 0;

    ksc.forEach((val, i) => {
      const pass = val >= threshold;
      if (pass) passCount++;
      const row = document.createElement('div');
      row.className = 'result-row';
      row.innerHTML = `
        <span class="result-label">ค่า ${i + 1}</span>
        <span class="result-value">${val.toFixed(2)}</span>
        <span style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-left:2px">ksc</span>
        <span class="badge ${pass ? 'pass' : 'fail'}">${pass ? 'ผ่าน' : 'ไม่ผ่าน'}</span>
      `;
      rowsEl.appendChild(row);
    });

    document.getElementById('passCount').textContent = passCount;
    document.getElementById('totalCount').textContent = ksc.length;
    document.getElementById('avgVal').textContent = avg.toFixed(2);
    document.getElementById('testTypeLabel').textContent = testType;
    document.getElementById('chartTitle').textContent = testType;

    const overallEl = document.getElementById('overallBadge');
    const allPass = passCount === ksc.length;
    overallEl.textContent = allPass ? '✓ ผ่าน' : '✗ ไม่ผ่าน';
    overallEl.className = 'overall-badge ' + (allPass ? 'pass' : 'fail');

    // Chart
    drawChart(ksc, threshold);

    document.getElementById('results').classList.remove('hidden');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function drawChart(ksc, threshold) {
    const chartArea = document.getElementById('chartArea');
    chartArea.innerHTML = '';

    const maxVal = Math.max(...ksc, threshold) * 1.2;
    const chartH = 156; // px available (180 - 24 bottom padding)

    // Threshold line
    const threshPct = (threshold / maxVal) * 100;
    const line = document.createElement('div');
    line.className = 'threshold-line';
    line.style.bottom = `calc(24px + ${threshPct}% * ${chartH / 180})`;
    line.style.bottom = (24 + (threshold / maxVal) * chartH) + 'px';
    line.innerHTML = `<span class="threshold-tag">Pass: ${threshold} ksc</span>`;
    chartArea.appendChild(line);

    ksc.forEach((val, i) => {
      const pass = val >= threshold;
      const heightPx = (val / maxVal) * chartH;

      const wrap = document.createElement('div');
      wrap.className = 'chart-bar-wrap';

      const bar = document.createElement('div');
      bar.className = 'chart-bar ' + (pass ? 'pass-bar' : 'fail-bar');
      bar.style.height = '0px';
      bar.style.width = '100%';

      const valLbl = document.createElement('span');
      valLbl.className = 'chart-bar-val';
      valLbl.textContent = val.toFixed(1);
      bar.appendChild(valLbl);

      wrap.appendChild(bar);

      const lbl = document.createElement('span');
      lbl.className = 'chart-bar-lbl';
      lbl.textContent = `ค่า ${i + 1}`;
      wrap.appendChild(lbl);

      chartArea.appendChild(wrap);

      setTimeout(() => {
        bar.style.height = heightPx + 'px';
      }, 50 + i * 80);
    });
  }

  function toggleFormulaEdit() {
    const editor = document.getElementById('formulaEditor');
    const icon = document.getElementById('formulaToggleIcon');
    const hidden = editor.classList.contains('hidden');
    editor.classList.toggle('hidden', !hidden);
    icon.textContent = hidden ? '✕ ปิด' : '⚙️ แก้';
  }

  function toggleSign() {
    const btn = document.getElementById('signBtn');
    const isPlus = btn.dataset.sign === '+';
    btn.dataset.sign = isPlus ? '-' : '+';
    btn.textContent = isPlus ? '−' : '+';
    document.getElementById('editorSign').textContent = isPlus ? '−' : '+';
    document.getElementById('dispSign').textContent = isPlus ? '−' : '+';
    saveFormula();
  }

  function updateFormulaDisplay() {
    const A = parseFloat(document.getElementById('coeffA').value) || 0.983;
    const B = parseFloat(document.getElementById('coeffB').value) || 4.175;
    document.getElementById('dispA').textContent = A;
    document.getElementById('dispB').textContent = B;
    saveFormula();
  }

  function saveFormula() {
    const A = document.getElementById('coeffA').value;
    const B = document.getElementById('coeffB').value;
    const sign = document.getElementById('signBtn').dataset.sign;
    const threshold = document.getElementById('threshold').value;
    const testType = document.getElementById('testType').value;
    localStorage.setItem('cubeCalc_A', A);
    localStorage.setItem('cubeCalc_B', B);
    localStorage.setItem('cubeCalc_sign', sign);
    localStorage.setItem('cubeCalc_threshold', threshold);
    localStorage.setItem('cubeCalc_testType', testType);
  }

  function loadFormula() {
    const A = localStorage.getItem('cubeCalc_A');
    const B = localStorage.getItem('cubeCalc_B');
    const sign = localStorage.getItem('cubeCalc_sign');
    const threshold = localStorage.getItem('cubeCalc_threshold');
    const testType = localStorage.getItem('cubeCalc_testType');

    if (A) document.getElementById('coeffA').value = A;
    if (B) document.getElementById('coeffB').value = B;
    if (threshold) document.getElementById('threshold').value = threshold;
    if (testType) document.getElementById('testType').value = testType;

    if (sign) {
      const btn = document.getElementById('signBtn');
      btn.dataset.sign = sign;
      const sym = sign === '+' ? '+' : '−';
      btn.textContent = sym;
      document.getElementById('editorSign').textContent = sym;
      document.getElementById('dispSign').textContent = sym;
    }

    updateFormulaDisplay();
  }

  // save threshold & testType on change too
  document.getElementById('threshold').addEventListener('input', saveFormula);
  document.getElementById('testType').addEventListener('change', saveFormula);

  // Load on startup
  loadFormula();
</script>

</body>
</html>
